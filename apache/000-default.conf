<VirtualHost *:80>
    ServerName www.aslsquads.com
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Reverse proxy for port 4000 with specific path /graphql
    ProxyPass /graphql http://localhost:4000/graphql
    ProxyPassReverse /graphql http://localhost:4000/graphql

    
    # Reverse proxy for port 3000
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/


    # Additional configuration can go here

</VirtualHost>