<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName aslsquads.com
    ServerAlias www.aslsquads.com
    DocumentRoot /var/www/html/aslsquads.com
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =aslsquads.com [OR]
    RewriteCond %{SERVER_NAME} =www.aslsquads.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    # WebSocket upgrade
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) wss://localhost:4000/websocket/$1 [P,L]

    ProxyPass /graphql http://localhost:4000/graphql
    ProxyPassReverse /graphql http://localhost:4000/graphql

    ProxyPass /websocket ws://localhost:4000/websocket
    ProxyPassReverse /websocket ws://localhost:4000/websocket

    ProxyPass / http://localhost:3001/
    ProxyPassReverse / http://localhost:3001/
</VirtualHost>

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName admin.aslsquads.com
    DocumentRoot /var/www/html
    ErrorLog ${APACHE_LOG_DIR}/admin_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_access.log combined

    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://localhost:3000/$1 [P,L]

    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/
</VirtualHost>
