<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName admin.aslsquads.com
        ServerAlias www.admin.aslsquads.com

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/aslsquads.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/aslsquads.com/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf

        ProxyPreserveHost On
        ProxyPass / http://127.0.0.1:3000/
        ProxyPassReverse / http://127.0.0.1:3000/

        ErrorLog ${APACHE_LOG_DIR}/admin_aslsquads_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/admin_aslsquads_ssl_access.log combined
    </VirtualHost>
</IfModule>

<IfModule mod_ssl.c>
    <VirtualHost *:80>
        ServerName admin.aslsquads.com
        ServerAlias www.admin.aslsquads.com

        # Redirect all HTTP requests to HTTPS
        RewriteEngine On
        RewriteCond %{HTTPS} off
        RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

        ErrorLog ${APACHE_LOG_DIR}/admin_aslsquads_error.log
        CustomLog ${APACHE_LOG_DIR}/admin_aslsquads_access.log combined
    </VirtualHost>
</IfModule>