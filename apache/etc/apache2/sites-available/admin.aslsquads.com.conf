<VirtualHost *:80>
    ServerName admin.aslsquads.com
    ServerAlias www.admin.aslsquads.com
    Redirect "/" "https://admin.aslsquads.com/"
</VirtualHost>

<VirtualHost *:443>
    ServerName admin.aslsquads.com
    ServerAlias www.admin.aslsquads.com

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/admin.aslsquads.com.crt
    SSLCertificateKeyFile /etc/ssl/private/admin.aslsquads.com.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Allow only small POST bodies (block bot abuse)
    LimitRequestBody 102400

    # Cache static assets (Next.js)
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$">
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
        Header set Cache-Control "public, max-age=604800, immutable"
    </LocationMatch>

    # Block probing for private files
    <FilesMatch "\.(env|git|npmrc|ssh|sql)$">
        Order allow,deny
        Deny from all
    </FilesMatch>

    # Rate limiting (basic bot protection)
    <Location />
        SetEnvIf X-Forwarded-For "^.*$" rate_limited
        SetEnv rate-limit 500
    </Location>

    # ==============================
    # Load Balancer (Admin Frontend)
    # ==============================
    <Proxy "balancer://admin_frontend_cluster">
        BalancerMember http://127.0.0.1:3001
        BalancerMember http://127.0.0.1:3002
        BalancerMember http://127.0.0.1:3003
        BalancerMember http://127.0.0.1:3004
        ProxySet lbmethod=byrequests
    </Proxy>

    ProxyPass "/" "balancer://admin_frontend_cluster/"
    ProxyPassReverse "/" "balancer://admin_frontend_cluster/"

    # WebSockets support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) balancer://admin_frontend_cluster/$1 [P,L]

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
</VirtualHost>
