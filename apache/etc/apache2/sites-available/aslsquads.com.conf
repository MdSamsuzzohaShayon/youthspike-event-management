<VirtualHost *:80>
    ServerName aslsquads.com
    ServerAlias www.aslsquads.com

    Alias /.well-known/ /var/www/html/.well-known/

    <Directory "/var/www/html/.well-known/">
        AllowOverride None
        Options None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPassMatch "^/.well-known/acme-challenge/.*" !

    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/aslsquads_error.log
    CustomLog ${APACHE_LOG_DIR}/aslsquads_access.log combined

RewriteEngine on
RewriteCond %{SERVER_NAME} =aslsquads.com [OR]
RewriteCond %{SERVER_NAME} =www.aslsquads.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
