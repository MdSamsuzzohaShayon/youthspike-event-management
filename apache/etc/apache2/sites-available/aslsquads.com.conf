<VirtualHost *:80>
    ServerName aslsquads.com
    ServerAlias www.aslsquads.com
    Redirect "/" "https://aslsquads.com/"
</VirtualHost>

<VirtualHost *:443>
    ServerName aslsquads.com
    ServerAlias www.aslsquads.com

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/aslsquads.com.crt
    SSLCertificateKeyFile /etc/ssl/private/aslsquads.com.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Allow only small POST bodies (block bot abuse)
    LimitRequestBody 102400

    # Cache static assets (critical for Next.js)
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$">
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
        Header set Cache-Control "public, max-age=604800, immutable"
    </LocationMatch>

    # Block probing for private files
    <FilesMatch "\.(env|git|npmrc|ssh|sql)$">
        Order allow,deny
        Deny from all
    </FilesMatch>

    # Rate limiting bots
    <Location />
        # Allow approx 10 requests/sec before throttling
        SetEnvIf X-Forwarded-For "^.*$" rate_limited
        SetEnv rate-limit 500
    </Location>

        # Load balancing
    <Proxy "balancer://ys_frontend_cluster">
        BalancerMember http://127.0.0.1:3001
        BalancerMember http://127.0.0.1:3002
        BalancerMember http://127.0.0.1:3003
        BalancerMember http://127.0.0.1:3004
        ProxySet lbmethod=byrequests
    </Proxy>

    ProxyPass "/" "balancer://ys_frontend_cluster/"
    ProxyPassReverse "/" "balancer://ys_frontend_cluster/"

    # WebSockets
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) balancer://ys_frontend_cluster/$1 [P,L]


    # Security
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
</VirtualHost>
