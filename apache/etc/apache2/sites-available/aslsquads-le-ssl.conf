<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName aslsquads.com
        ServerAlias www.aslsquads.com
        DocumentRoot /var/www/html/aslsquads.com
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/aslsquads.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/aslsquads.com/privkey.pem

        # Reverse proxy for /graphql
        ProxyPass /graphql http://localhost:4000/graphql
        ProxyPassReverse /graphql http://localhost:4000/graphql

        # WebSocket reverse proxy for /websocket
        ProxyPass /websocket ws://localhost:4000/websocket
        ProxyPassReverse /websocket ws://localhost:4000/websocket

        # Reverse proxy for the root path frontend
        ProxyPass / http://localhost:3001/
        ProxyPassReverse / http://localhost:3001/
    </VirtualHost>

    # Subdomain configuration
    <VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName admin.aslsquads.com
        DocumentRoot /var/www/html/admin
        ErrorLog ${APACHE_LOG_DIR}/admin_error.log
        CustomLog ${APACHE_LOG_DIR}/admin_access.log combined

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/admin.aslsquads.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/admin.aslsquads.com/privkey.pem

        # Reverse proxy for the admin
        ProxyPass / http://localhost:3000/
        ProxyPassReverse / http://localhost:3000/
    </VirtualHost>
</IfModule>