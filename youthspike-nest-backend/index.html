<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
</head>
<body>
    <h2>WebSocket Client</h2>
    <label>Room ID: <input type="text" id="room" value="test-room"></label>
    <br>
    <label>Message: <input type="text" id="message"></label>
    <br>
    <button onclick="joinRoom()">Join Room</button>
    <button onclick="sendMessage()">Send Message</button>
    <div id="logs"></div>

    <!-- Load Socket.IO client -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" integrity="sha384-mkQ3/7FUtcGyoppY6bz/PORYoGqOl7/aSUMn2ymDOJcapfS6PHqxhRTMh1RR0Q6+" crossorigin="anonymous"></script>


    <script>
        // Connect to the WebSocket server
        const socket = io("ws://localhost:4000/websocket");

        socket.on("connect", () => {
            logMessage(`✅ Connected to WebSocket server with ID: ${socket.id}`);
        });

        socket.on("disconnect", () => {
            logMessage("❌ Disconnected from server");
        });

        socket.on("message", (data) => {
            logMessage(`📩 Message received: ${JSON.stringify(data)}`);
        });

        socket.on("join-room-response", (data) => {
            logMessage(`🏠 ${data}`);
        });

        function joinRoom() {
            const room = document.getElementById("room").value;
            socket.emit("joinRoom", room);
            logMessage(`🚀 Joining room: ${room}`);
        }

        function sendMessage() {
            const room = document.getElementById("room").value;
            const message = document.getElementById("message").value;
            socket.emit("message", { room, message });
            logMessage(`📤 Sent message: "${message}" to room: ${room}`);
        }

        function logMessage(msg) {
            console.log(msg);
            document.getElementById("logs").innerHTML += `<p>${msg}</p>`;
        }
    </script>

</body>
</html>
