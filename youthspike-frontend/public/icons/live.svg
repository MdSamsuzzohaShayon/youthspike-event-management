<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 32"
  role="img"
  aria-labelledby="liveTitle liveDesc"
  preserveAspectRatio="xMinYMid meet"
>
  <title id="liveTitle">Live broadcast</title>
  <desc id="liveDesc">Red pulsing live indicator with the label "LIVE".</desc>

  <style>
    /* Pulsing ring */
    .pulse-ring {
      transform-origin: 16px 16px;
      animation: pulse 1.8s ease-out infinite;
      opacity: 0.9;
    }
    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.9; }
      50%  { transform: scale(1.6); opacity: 0.35; }
      100% { transform: scale(2);   opacity: 0; }
    }

    .dot { transition: fill .15s; }
    .label { font: 600 11px/1 "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; letter-spacing: .6px; }
  </style>

  <!-- Group left: pulse + dot -->
  <g transform="translate(4,0)">
    <!-- Pulsing ring -->
    <circle class="pulse-ring" cx="16" cy="16" r="8" fill="#ff3b30" />

    <!-- Solid center dot -->
    <circle class="dot" cx="16" cy="16" r="6" fill="#ff3b30" />
  </g>

  <!-- Label to the right -->
  <text x="36" y="20" class="label" fill="#111" text-anchor="start">LIVE</text>
</svg>
