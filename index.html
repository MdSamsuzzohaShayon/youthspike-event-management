<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Music Player</title>
</head>
<body>

  <h1>JavaScript Music Player</h1>

  <audio id="myAudio" controls>
    <source src="./youthspike-frontend/public/audio/notification.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>

  <button onclick="playAudio()">Play</button>
  <button onclick="pauseAudio()">Pause</button>
  <button onclick="stopAudio()">Stop</button>
  <button onclick="restartAudio()">Restart</button>

  <script>
    // Get the audio element
    var audio = document.getElementById("myAudio");

    // Function to play the audio
    function playAudio() {
      audio.play();
    }

    // Function to pause the audio
    function pauseAudio() {
      audio.pause();
    }

    // Function to stop the audio and reset to the beginning
    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
    }

    // Function to restart the audio from the beginning
    function restartAudio() {
      stopAudio(); // Stop and reset to the beginning
      playAudio(); // Start playing again
    }
  </script>

</body>
</html>
